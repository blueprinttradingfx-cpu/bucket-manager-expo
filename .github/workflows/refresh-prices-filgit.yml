name: Refresh price cache (filgit - backup)

# Runs ~45 min after the primary dragonfi workflow (refresh-prices-dragonfi.yml,
# 08:00 UTC) specifically so it has that run's output to check for gaps
# against - see generate_price_cache_filgit.py for why this only fills
# gaps rather than re-scraping everything.
#
# No Playwright/Chromium needed here - filgit.com's listing pages are
# server-rendered (confirmed directly), so this job is much lighter than
# the dragonfi one.
on:
  schedule:
    - cron: '45 8 * * 1-5'
  workflow_dispatch: {}  # lets you trigger a manual backup run from the Actions tab

permissions:
  contents: write  # needed to commit prices.json back to the repo

jobs:
  backup-refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run backup scraper (gap-fill only)
        run: python price-scraper/scripts/generate_price_cache_filgit.py

      - name: Commit updated price cache
        run: |
          git config user.name "price-cache-bot"
          git config user.email "actions@github.com"
          git add public/data/prices.json
          git diff --staged --quiet && echo "No changes from backup run" && exit 0
          git commit -m "chore: filgit backup price backfill $(date -u +%Y-%m-%d)"
          git push
