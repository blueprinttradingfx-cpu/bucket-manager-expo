name: Refresh price cache

# PSE closes 2:45 PM Manila time (Asia/Manila = UTC+8), weekdays.
# 08:00 UTC = 4:00 PM Manila - a safety buffer after close/settlement.
on:
  schedule:
    - cron: '0 8 * * 1-5'
  workflow_dispatch: {}  # lets you trigger a manual refresh from the Actions tab

permissions:
  contents: write  # needed to commit prices.json back to the repo

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper
        run: python price-scraper/scripts/generate_price_cache.py

      - name: Commit updated price cache
        run: |
          git config user.name "price-cache-bot"
          git config user.email "actions@github.com"
          git add public/data/prices.json
          git diff --staged --quiet && echo "No price changes" && exit 0
          git commit -m "chore: refresh price cache $(date -u +%Y-%m-%d)"
          git push
